<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="true" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bar" />
  <meta name="theme-color" content="#2C1A0E" />
  <meta name="mobile-web-app-capable" content="true" />
  <title id="pageTitle">Bar - Gestion de Mesas</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="keyboard.css" />
  <style>
    /* Prevenir zoom accidental en inputs */
    input, textarea, select { font-size: 16px !important; }
    /* Prevenir comportamientos por defecto en iOS */
    body { -webkit-user-select: none; -webkit-touch-callout: none; }
    input, textarea { -webkit-user-select: text; }
    /* Safe areas para notches */
    .header { padding-left: max(24px, env(safe-area-inset-left)); padding-right: max(24px, env(safe-area-inset-right)); }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-logo">
      <div>
        <h1 id="barName">BAR</h1>
        <div class="subtitle">GESTION</div>
      </div>
    </div>
    <div class="header-right">
      <div class="header-clock" id="reloj"></div>
      <div class="btn btn-ghost" id="headerNombreDispositivo"></div>
      <button class="btn btn-danger btn-sm" id="btnCierre">Cierre</button>
    </div>
  </header>

  <main class="page-main">
    <div class="page-toolbar">
      <h2>Mesas activas</h2>
      <div class="toolbar-actions">
        <button class="btn btn-primary" id="btnNuevaMesa">
          Nueva Mesa
        </button>
        <button class="btn btn-secondary" id="btnNuevaMesaRapida">
          Mesa rapida
        </button>
      </div>
    </div>

    <div class="mesas-grid" id="mesasGrid">
    </div>
  </main>

  <div class="modal-overlay" id="modalCrearMesa">
    <div class="modal">
      <h3>Nueva Mesa</h3>
      <p class="modal-sub">Introduce el nombre o numero para identificar la mesa.</p>
      <div class="form-group">
        <label for="inputNombreMesa">Nombre o numero de mesa</label>
        <input
          type="text"
          id="inputNombreMesa"
          class="form-input"
          placeholder="Ej: Mesa 5, Terraza 2, Barra..."
          maxlength="40"
          autocomplete="off"
        />
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="btnCancelarCrear">Cancelar</button>
        <button class="btn btn-primary" id="btnConfirmarCrear">Crear Mesa</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modalCierrePassword">
    <div class="modal">
      <h3>Acceso administrativo</h3>
      <p class="modal-sub">Introduce la contrasena para abrir el cierre del dia.</p>
      <div class="form-group">
        <label for="inputCierrePassword">Contrasena</label>
        <input
          type="password"
          id="inputCierrePassword"
          class="form-input"
          placeholder="Contrasena de administrador"
          autocomplete="current-password"
        />
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="btnCancelarCierre">Cancelar</button>
        <button class="btn btn-danger" id="btnConfirmarCierre">Entrar</button>
      </div>
    </div>
  </div>

  <div class="loader-overlay" id="loader">
    <div class="spinner"></div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="api.js"></script>
  <script src="main.js"></script>
  <script src="keyboard.js"></script>
</body>
</html>
