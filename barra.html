<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="true"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Barra"/>
  <meta name="theme-color" content="#2C1A0E"/>
  <title>Barra · Bar</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="barra.css"/>
  <style>
    input, textarea, select { font-size: 16px !important; }
    body { -webkit-user-select: none; -webkit-touch-callout: none; }
    input, textarea { -webkit-user-select: text; }
    .header { padding-left: max(12px, env(safe-area-inset-left)); padding-right: max(12px, env(safe-area-inset-right)); }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-logo">
      <span class="icon">🍺</span>
      <div><h1>BAR</h1><div class="subtitle">BARRA</div></div>
    </div>
    <div class="header-right">
      <div class="header-clock" id="reloj"></div>
    </div>
  </header>

  <main class="barra-main" id="barraMain">
  </main>

  <div class="loader-overlay" id="loader"><div class="spinner"></div></div>
  <div class="toast-container" id="toastContainer"></div>

  <script src="api.js"></script>
  <script src="barra.js"></script>
</body>
</html>
